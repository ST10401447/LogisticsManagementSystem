services:

  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      SA_PASSWORD: "LogisticsPass123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - logistics-network

  logistics-api:
    build:
      context: .
      dockerfile: Dockerfile.Api
    container_name: glms-backend-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sql-server-db;Database=LogisticsDB;User Id=sa;Password=LogisticsPass123!;TrustServerCertificate=True;
    ports:
      - "8080:8080"
    depends_on:
      - sql-server-db
    networks:
      - logistics-network

  logistics-mvc:
    build:
      context: .
      dockerfile: Dockerfile.Mvc
    container_name: glms-frontend-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiSettings__BaseUrl=http://logistics-api:8080/
    ports:
      - "8081:8080"
    depends_on:
      - logistics-api
    networks:
      - logistics-network

networks:
  logistics-network:
    driver: bridge